name: Deploy to VPS (peramoredellavita.pl)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-peramoredellavita
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          if [ -n "${{ secrets.VPS_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.VPS_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          fi

      - name: Sync files to VPS
        env:
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USER }}
          PORT: ${{ secrets.VPS_PORT }}
          APP_DIR: /home/deploy/peramoredellavita-cms
        run: |
          set -euo pipefail
          test -n "$HOST" && test -n "$USER"
          SSH_PORT="${PORT:-22}"
          SSH_BASE_OPTS="-i $HOME/.ssh/vps_key -o StrictHostKeyChecking=yes -o ServerAliveInterval=20 -o ServerAliveCountMax=18 -o TCPKeepAlive=yes -p $SSH_PORT"
          RSYNC_RSH="ssh $SSH_BASE_OPTS"

          ssh $SSH_BASE_OPTS "$USER@$HOST" "mkdir -p '$APP_DIR'"

          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude '.next/' \
            --exclude '.env' \
            -e "$RSYNC_RSH" \
            ./ "$USER@$HOST:$APP_DIR/"

      - name: Install deps and rebuild on VPS
        env:
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USER }}
          PORT: ${{ secrets.VPS_PORT }}
          APP_DIR: /home/deploy/peramoredellavita-cms
        run: |
          set -euo pipefail
          SSH_PORT="${PORT:-22}"
          SSH_BASE_OPTS="-i $HOME/.ssh/vps_key -o StrictHostKeyChecking=yes -o ServerAliveInterval=20 -o ServerAliveCountMax=18 -o TCPKeepAlive=yes -p $SSH_PORT"
          ssh $SSH_BASE_OPTS "$USER@$HOST" \
            "cd '$APP_DIR' && npm install && npm run db:generate && npm run db:push && npm run build && pm2 restart peramoredellavita-cms || pm2 start npm --name peramoredellavita-cms -- start"
